name: docs

# Builds the warehouse on a clean runner, generates the dbt docs lineage graph as a
# single self-contained page, and deploys it to GitHub Pages. Runs on every push to
# main (i.e. after a step PR merges). Zero secrets beyond the default GITHUB_TOKEN.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: dbt deps --profiles-dir .
      - run: python scripts/generate_and_load.py
      - run: dbt snapshot --profiles-dir .
      - run: python scripts/generate_and_load.py --scenario v2
      - run: dbt build --profiles-dir .
      - name: Generate static lineage docs
        run: dbt docs generate --static --profiles-dir .
      - name: Assemble the Pages site
        run: |
          mkdir -p site
          cp target/static_index.html site/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
